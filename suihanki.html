<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>炊飯器フィットコンサル</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f4f4f4;
padding:20px;
max-width:520px;
margin:auto;
}

h1{text-align:center}

.progress{
text-align:center;
margin-bottom:15px;
color:#666;
}

.card{
background:white;
padding:22px;
border-radius:14px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.question{
font-size:20px;
margin-bottom:15px;
}

.option{
padding:14px;
border:2px solid #e5e5e5;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
}

.option:hover{
border-color:#ff6a00;
}

.selected{
border-color:#ff6a00;
background:#fff4ed;
}

.controls{
display:flex;
gap:10px;
margin-top:15px;
}

button{
flex:1;
padding:14px;
border:none;
border-radius:10px;
font-size:15px;
}

.next{
background:#ff6a00;
color:white;
}

.back{
background:#ddd;
}

.resultCard{
background:white;
padding:20px;
border-radius:14px;
margin-top:20px;
box-shadow:0 8px 18px rgba(0,0,0,0.08);
}

.rank{
border-bottom:1px solid #eee;
margin-bottom:15px;
padding-bottom:15px;
}

.capacity{
background:#fff4ed;
padding:10px;
border-radius:8px;
margin-bottom:15px;
}

.brandBtn{
background:#333;
color:white;
margin-top:5px;
padding:8px;
border-radius:6px;
font-size:13px;
}

.brandInfo{
background:#f8f8f8;
padding:10px;
border-radius:8px;
margin-top:6px;
font-size:13px;
display:none;
}

.reset{
background:#444;
color:white;
margin-top:15px;
width:100%;
}

</style>
</head>

<body>

<h1>炊飯器フィットコンサル</h1>

<div class="progress" id="progress"></div>

<div class="card">

<div id="quiz"></div>

<div class="controls">
<button class="back" onclick="prev()">戻る</button>
<button class="next" onclick="next()">次へ</button>
</div>

</div>

<div id="result"></div>

<script>

const questions=[

{q:"① 人数",key:"people",
o:[["1〜2人","small"],["3人以上","family"]]},

{q:"② ごはんの好み",key:"taste",
o:[["甘み","sweet"],["粒立ち","grain"],["バランス","balance"]]},

{q:"③ 保温",key:"warm",
o:[["よく使う","often"],["普通","mid"],["あまり使わない","rare"]]},

{q:"④ 炊飯頻度",key:"freq",
o:[["毎日","high"],["週数回","mid"],["たまに","low"]]},

{q:"⑤ 早炊き",key:"fast",
o:[["使う","yes"],["使わない","no"]]},

{q:"⑥ 掃除のしやすさ",key:"clean",
o:[["重視","high"],["普通","mid"],["気にしない","low"]]},

{q:"⑦ 価格帯",key:"price",
o:[["低価格","low"],["中堅","mid"],["高機能","high"]]},

{q:"⑧ 炊き分け機能",key:"separate",
o:[["欲しい","yes"],["不要","no"]]}

]

let current=0
let answers={}

function render(){

let q=questions[current]

progress.innerText=`質問 ${current+1} / ${questions.length}`

let html=`<div class="question">${q.q}</div>`

q.o.forEach(v=>{

let s=answers[q.key]==v[1]?"selected":""

html+=`<div class="option ${s}" onclick="select('${q.key}','${v[1]}',this)">${v[0]}</div>`

})

quiz.innerHTML=html

}

function select(k,v,el){

answers[k]=v

document.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"))

el.classList.add("selected")

}

function next(){

if(!answers[questions[current].key]) return

current++

if(current>=questions.length){

showResult()
return

}

render()

}

function prev(){

if(current==0) return

current--

render()

}

function toggleBrand(id){

let el=document.getElementById(id)

el.style.display= el.style.display=="block" ? "none":"block"

}

function showResult(){

let score={z:0,t:0,p:0,to:0,m:0}

if(answers.taste=="sweet") score.z+=3
if(answers.taste=="grain") score.m+=3
if(answers.taste=="balance") score.p+=2

if(answers.warm=="often"){score.to+=3;score.z+=2}

if(answers.clean=="high"){score.z+=2;score.p+=2}

if(answers.price=="high") score.t+=2

let capacity = answers.people=="small"
? "おすすめ容量：3合"
: "おすすめ容量：5.5合"

let items=[

{
name:"象印 炎舞炊き",
model:"NW-FC10 / NW-FA10",
brand:"z",
catch:"ローテーションIHの極上炊飯",
desc:"激しい対流でお米の甘みを最大化する象印最高峰モデル。",
clean:"部品少なく洗いやすい",
brandInfo:"甘み炊飯と保温性能がトップクラス"
},

{
name:"タイガー 本土鍋",
model:"JPG-S100 / JPL-G100",
brand:"t",
catch:"本物土鍋の香り炊き",
desc:"萬古焼の本土鍋で香り高く炊き上げる。",
clean:"土鍋構造でやや重い",
brandInfo:"土鍋炊飯で香りと粒感が強い"
},

{
name:"パナソニック おどり炊き",
model:"SR-V10BA / SR-S910D",
brand:"p",
catch:"可変圧力おどり炊き",
desc:"甘みと粒立ちのバランス炊飯。",
clean:"内ぶた食洗機対応",
brandInfo:"可変圧力で均一炊飯"
},

{
name:"東芝 炎匠炊き",
model:"RC-10VXT",
brand:"to",
catch:"真空ひたし炊飯",
desc:"真空吸水で米の芯まで水を浸透。",
clean:"パーツ少なめ",
brandInfo:"真空技術で吸水性能が高い"
},

{
name:"三菱 本炭釜",
model:"NJ-VWD10",
brand:"m",
catch:"粒立ち炊飯の王道",
desc:"しゃっきり食感のご飯が得意。",
clean:"釜はやや重い",
brandInfo:"炭釜の高火力炊飯"
}

]

items.forEach(i=>i.score=score[i.brand])

items.sort((a,b)=>b.score-a.score)

let html=`<div class="resultCard">

<div class="capacity">${capacity}</div>`

for(let i=0;i<3;i++){

let p=items[i]

html+=`

<div class="rank">

<h3>${i+1}位 ${p.name}</h3>

<p><b>型番</b> ${p.model}</p>

<p><b>${p.catch}</b></p>

<p>${p.desc}</p>

<p>お手入れ：${p.clean}</p>

<button class="brandBtn" onclick="toggleBrand('b${i}')">メーカー特徴</button>

<div id="b${i}" class="brandInfo">${p.brandInfo}</div>

</div>

`

}

html+=`<button class="reset" onclick="resetQuiz()">最初から診断</button></div>`

quiz.style.display="none"
document.querySelector(".controls").style.display="none"

result.innerHTML=html

}

function resetQuiz(){

answers={}
current=0

quiz.style.display="block"
document.querySelector(".controls").style.display="flex"

result.innerHTML=""

render()

}

render()

</script>

</body>
</html>
