<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家電フィット診断ホーム</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
            max-width: 900px; /* 少し広めに設定 */
            margin: auto;
            color: #333;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
            min-height: 95vh;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            text-align: center;
        }
        h1 { font-size: 1.8rem; margin-bottom: 15px; }
        .subtitle { font-size: 1.1rem; color: #666; margin-bottom: 40px; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { margin: 15px 0; }
        a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            font-size: 1.2rem;
            display: block;
            padding: 30px 20px;
            border: 2px solid #eee;
            border-radius: 20px;
            background-color: white;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        a:active { transform: scale(0.98); background-color: #fefefe; }
        a span { display: block; font-size: 3rem; margin-bottom: 10px; }

        /* iPad / PC レイアウト */
        @media (min-width: 768px) {
            body { padding: 40px; }
            h1 { font-size: 2.8rem; }
            .subtitle { font-size: 1.4rem; }
            ul { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
            a { font-size: 1.5rem; padding: 50px 30px; }
            a:hover { border-color: #ff8c00; box-shadow: 0 10px 20px rgba(0,0,0,0.1); transform: translateY(-5px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 家電フィット診断</h1>
        <p class="subtitle">ライフスタイルにぴったりの一台を。診断スタート！</p>
        <ul>
            <li>
                <a href="sentakuki.html">
                    <span>🧺</span>
                    ドラム式洗濯機 診断
                </a>
            </li>
            <li>
                <a href="suihanki.html">
                    <span>🍚</span>
                    炊飯器 診断
                </a>
            </li>
        </ul>
    </div>
</body>
</html>
