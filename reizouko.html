<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冷蔵庫フィットコンサル</title>
    <style>
        /* 全診断ページ共通の統一スタイル */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: auto;
            line-height: 1.5;
            color: #333;
            background-color: #f9f9f9;
            font-size: 16px;
        }

        h1 { 
            font-size: 1.5rem; 
            text-align: center; 
            margin-bottom: 25px; 
            color: #0077cc;
        }

        /* 進捗ドット */
        .progress { text-align: center; margin-bottom: 20px; }
        .dot { height: 10px; width: 10px; margin: 5px; display: inline-block; border-radius: 50%; background: #ddd; }
        .active { background: #0077cc; }
        .done { background: #b3d9ff; }

        h3 { font-size: 1.2rem; margin-bottom: 15px; }

        .card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* 選択肢ボタン */
        .option {
            display: block;
            margin: 10px 0;
            padding: 20px;
            border: 2px solid #eee;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            transition: 0.2s;
        }
        .option:hover { border-color: #0077cc; }
        .selected {
            border-color: #0077cc;
            background-color: #f0f7ff;
        }

        /* 操作ボタン */
        .controls {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }
        button { 
            flex: 1; 
            padding: 16px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
        }
        .next { background: #0077cc; color: white; }
        .back { background: #ddd; color: #666; }

        /* 結果エリア */
        .rank { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            border: 1px solid #eee;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .actionButtons { display: flex; flex-direction: column; gap: 12px; margin-top: 30px; }
        .reset { background: #0077cc; color: white; padding: 18px; font-size: 1.1rem; font-weight: bold; width: 100%; border-radius: 12px; border: none; cursor: pointer; }
        .homeBtn { 
            background: #333; 
            color: white !important; 
            text-decoration: none; 
            text-align: center; 
            padding: 18px; 
            border-radius: 12px; 
            font-size: 1.1rem; 
            font-weight: bold; 
        }

        /* iPad / PC レイアウト調整 */
        @media (min-width: 768px) {
            body { padding: 40px; font-size: 18px; }
            h1 { font-size: 2.2rem; }
            h3 { font-size: 1.5rem; }
            .option { padding: 24px; font-size: 1.2rem; }
            .rank b { font-size: 1.4rem !important; }
        }
    </style>
</head>

<body>

    <h1>🧊 冷蔵庫フィットコンサル</h1>

    <div class="progress" id="progress"></div>

    <div class="card" id="mainCard">
        <div id="quiz"></div>
        <div class="controls">
            <button class="back" onclick="prev()">戻る</button>
            <button class="next" onclick="next()">次へ</button>
        </div>
    </div>

    <div id="resultArea"></div>

    <script>
        let answers = {};
        let current = 0;

        const questions = [
            {q: "① 設置幅", key: "width", o: [["60cm", "60"], ["65cm", "65"], ["66cm以上", "66"]]},
            {q: "② ドアタイプ", key: "door", dynamic: true},
            {q: "③ よく使うのは？", key: "use", o: [["野菜室", "veg"], ["冷凍室", "freeze"]]}
        ];

        function getDoorOptions() {
            if (answers.width == "60") return [["片開き", "single"]];
            if (answers.width == "65") return [["片開き", "single"], ["両開き（観音開き）", "double"]];
            return [["両開き（観音開き）", "double"]];
        }

        function updateProgress() {
            let html = "";
            for (let i = 0; i < questions.length; i++) {
                let cls = "dot";
                if (i < current) cls += " done";
                else if (i === current) cls += " active";
                html += `<span class="${cls}"></span>`;
            }
            document.getElementById("progress").innerHTML = html;
        }

        function render() {
            updateProgress();
            let q = questions[current];
            let html = `<h3>${q.q}</h3>`;
            let options = q.dynamic ? getDoorOptions() : q.o;

            options.forEach(v => {
                let sel = answers[q.key] == v[1] ? "selected" : "";
                html += `<div class="option ${sel}" onclick="select('${q.key}','${v[1]}')">${v[0]}</div>`;
            });

            document.getElementById("quiz").innerHTML = html;
        }

        function select(k, v) {
            answers[k] = v;
            render();
        }

        function next() {
            if (!answers[questions[current].key]) {
                alert("選択してください");
                return;
            }
            current++;
            if (current >= questions.length) {
                showResult();
                return;
            }
            render();
        }

        function prev() {
            if (current == 0) return;
            current--;
            render();
        }

        function showResult() {
            let score = {mitsu:0, toshi:0, hita:0, sharp:0, pana:0, aqua:0, haier:0};

            if (answers.use == "veg") score.toshi += 3;
            if (answers.use == "freeze") { score.hita += 3; score.mitsu += 2; }
            if (answers.door == "double") score.sharp += 2;
            if (answers.door == "single") score.aqua += 1;
            if (answers.width == "60") score.haier += 2;

            let width = answers.width;
            let allowed = [];
            if (width == "60") allowed = ["mitsu", "toshi", "hita", "sharp", "pana", "aqua", "haier"];
            if (width == "65") allowed = ["mitsu", "toshi", "hita", "sharp", "pana", "aqua"];
            if (width == "66") allowed = ["mitsu", "toshi", "hita", "sharp", "pana"];

            const makerName = { mitsu: "三菱電機", toshi: "東芝", hita: "日立", sharp: "シャープ", pana: "パナソニック", aqua: "AQUA", haier: "ハイアール" };
            const models = {
                mitsu:{"60":["MR-P15M"],"65":["MR-MZ49N"],"66":["MR-WZ55N"]},
                toshi:{"60":["GR-W350FZ"],"65":["GR-W450FZ"],"66":["GR-W550FZ"]},
                hita:{"60":["R-HZC36T"],"65":["R-HWS47"],"66":["R-HWC54T"]},
                sharp:{"60":["SJ-D35R"],"65":["SJ-MF46R"],"66":["SJ-MF51R"]},
                pana:{"60":["NR-C37ES2"],"65":["NR-E45RY3"],"66":["NR-F55HY2"]},
                aqua:{"60":["AQR-36A"],"65":["AQR-36A"],"66":["AQR-36A"]},
                haier:{"60":["JR-NF140P"],"65":[],"66":[]}
            };
            const desc = {
                mitsu: "瞬冷凍＋独立製氷で冷凍も氷も強い万能機",
                toshi: "野菜室の鮮度保持がトップクラス",
                hita: "真空チルド＋大容量冷凍で作り置き最強",
                sharp: "スリム設計で設置しやすく両開きが便利",
                pana: "省エネと冷凍性能のバランスが優秀",
                aqua: "シンプルで使いやすくコスパ良し",
                haier: "低価格で一人暮らし向け"
            };

            let baseArr = Object.entries(score)
                .filter(([k]) => allowed.includes(k))
                .sort((a, b) => b[1] - a[1]);

            let html = "<h2>診断結果ランキング</h2>";
            let usedKeys = [];
            for (let i = 0; i < Math.min(3, baseArr.length); i++) {
                let key = baseArr[i][0];
                usedKeys.push(key);
                let list = models[key][width] || [];
                let modelName = list.length ? list.join(" / ") : "該当なし";

                html += `
                <div class="rank">
                    <b style="font-size:1.2rem; color:#0077cc;">${i+1}位 ${makerName[key]}</b><br>
                    <div style="margin-top:8px;">
                        <strong>おすすめ：</strong>${modelName}<br>
                        <strong>特徴：</strong>${desc[key]}
                    </div>
                </div>`;
            }

            if (width == "60") {
                let bigger = Object.entries(score)
                    .filter(([k]) => models[k]["65"].length > 0 && !usedKeys.includes(k))
                    .sort((a, b) => b[1] - a[1]).slice(0, 1);

                if (bigger.length) {
                    html += `<h3 style="margin-top:25px; color:#666;">💡 もう少し設置幅を広げられるなら</h3>`;
                    bigger.forEach(([key]) => {
                        let model = models[key]["65"].join(" / ");
                        html += `
                        <div class="rank" style="border-left: 4px solid #0077cc;">
                            <b>${makerName[key]}</b><br>
                            ${model}<br>
                            <small>${desc[key]}</small>
                        </div>`;
                    });
                }
            }

            html += `
                <div class="actionButtons">
                    <button class="reset" onclick="reset()">最初から診断する</button>
                    <a href="index.html" class="homeBtn">トップページに戻る</a>
                </div>
            `;

            document.getElementById("mainCard").style.display = "none";
            document.getElementById("resultArea").innerHTML = html;
            window.scrollTo(0, 0);
        }

        function reset() {
            answers = {};
            current = 0;
            document.getElementById("mainCard").style.display = "block";
            document.getElementById("resultArea").innerHTML = "";
            render();
        }

        render();
    </script>
</body>
</html>
